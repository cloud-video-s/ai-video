timezone: Asia/Shanghai
server:
  port: 8080
  mode: debug # debug | release | test

database:
  driver: mysql
  host: 127.0.0.1
  port: 3306
  username: root
  password: 123456
  dbname: app
  charset: utf8mb4
  max_idle_conns: 10
  max_open_conns: 100
  log_level: info # silent | error | warn | info

redis:
  host: 127.0.0.1
  port: 6379
  password: ""
  db: 0
  key_prefix: "video:"

jwt:
  secret: frame-jwt-secret-key-change-in-production
  expire: 7200    # token 过期时间（秒）
  issuer: frame

geoip:
  # Set country_header only when a trusted reverse proxy overwrites it.
  country_header: ""
  # Optional JSON lookup endpoint; {ip} is replaced with the client IP.
  lookup_url: ""
  country_field: country_code
  timeout_ms: 3000

# Google/Apple ID Token backend verification. Configure every mobile/web
# OAuth client ID or Apple bundle/service ID that is allowed to call this API.
third_party_auth:
  http_timeout_ms: 5000
  jwks_cache_seconds: 21600
  google:
    client_ids: []
    issuers: [https://accounts.google.com, accounts.google.com]
    jwks_url: https://www.googleapis.com/oauth2/v3/certs
  apple:
    client_ids: []
    issuers: [https://appleid.apple.com]
    jwks_url: https://appleid.apple.com/auth/keys

upload:
  # Temporary upload sessions and chunks. This directory is never served publicly.
  root_dir: storage/uploads/tmp
  # Final local files are served from /uploads. The active provider can also be
  # changed in Admin -> System Config without restarting the service.
  local_root_dir: storage/uploads/files
  local_base_url: /uploads
  storage_provider: local            # local | aliyun_oss
  oss_endpoint: ""
  oss_access_key_id: ""
  oss_access_key_secret: ""
  oss_bucket: ""
  oss_object_prefix: uploads
  oss_base_url: ""                   # Optional CDN/custom domain
  chunk_size: 5242880               # 5 MB
  max_batch_files: 20
  session_ttl_seconds: 86400        # 24 hours
  image_max_file_size: 20971520     # 20 MB
  video_max_file_size: 2147483648   # 2 GB
  image_extensions: [.jpg, .jpeg, .png, .gif, .webp]
  video_extensions: [.mp4, .mov, .webm, .mkv]
  image_mime_types: [image/jpeg, image/png, image/gif, image/webp]
  video_mime_types: [video/mp4, video/quicktime, video/webm, video/x-matroska]

casbin:
  model_path: config/rbac_model.conf
task:
  concurrency: 10                  # Worker 并发数
  queues:                          # 队列列表（按优先级从高到低）
    - critical
    - default
    - low

log:
  level: info       # debug | info | warn | error
  format: console   # console | json
  directory: logs    # 文件日志目录；当前文件为 app.log
  max_size: 100      # MB，达到大小后轮转，不按天主动切分
  max_backups: 10    # 保留旧日志文件数量
  max_age: 30        # days，文件日志旧文件最长保留天数；0 表示不按天数清理。数据库操作日志由系统配置 log.operation_retain_days 控制
